name: Deploy (Azure Container Apps)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep
        run: az bicep install

      - name: Deploy infra (Bicep baseline)
        run: |
          az group create \
            --name "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --location "${{ secrets.AZURE_LOCATION }}"

          az deployment group create \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name main \
            --template-file "infra/bicep/main.bicep" \
            --parameters \
              prefix="${{ secrets.AZURE_PREFIX }}" \
              location="${{ secrets.AZURE_LOCATION }}" \
              deployApps=false

      - name: Resolve ACR
        id: acr
        run: |
          ACR_NAME=$(az deployment group show \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name main \
            --query "properties.outputs.acrName.value" -o tsv)
          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"

          LOGIN_SERVER=$(az acr show -n "$ACR_NAME" --query "loginServer" -o tsv)
          echo "login_server=$LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      - name: Build and push images
        run: |
          az acr login --name "${{ steps.acr.outputs.acr_name }}"

          docker build -t "${{ steps.acr.outputs.login_server }}/ekip-backend:latest" ./backend
          docker push "${{ steps.acr.outputs.login_server }}/ekip-backend:latest"

          docker build -t "${{ steps.acr.outputs.login_server }}/ekip-worker:latest" ./backend
          docker push "${{ steps.acr.outputs.login_server }}/ekip-worker:latest"

          docker build -t "${{ steps.acr.outputs.login_server }}/ekip-frontend:latest" ./frontend
          docker push "${{ steps.acr.outputs.login_server }}/ekip-frontend:latest"

      - name: Deploy Container Apps
        run: |
          az deployment group create \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name main \
            --template-file "infra/bicep/main.bicep" \
            --parameters \
              prefix="${{ secrets.AZURE_PREFIX }}" \
              location="${{ secrets.AZURE_LOCATION }}" \
              deployApps=true
